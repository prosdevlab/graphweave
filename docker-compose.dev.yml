services:
  execution:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./packages/execution:/app
      - ./data:/data
    ports:
      - "8000:8000"
    command: >
      sh -c "pip install uv && uv sync && uv run uvicorn app.main:app --reload --host 0.0.0.0 --port 8000"
    env_file:
      - ./packages/execution/.env
